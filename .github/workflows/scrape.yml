name: GSCCCA Lead Scraper

on:
  schedule:
    # Tier 1: daily at 7:00 AM EST (12:00 UTC)
    - cron: '0 12 * * *'
    # Tier 2: every Monday at 7:00 AM EST
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      counties:
        description: 'Counties (ALL or comma-separated: FULTON,COBB,GWINNETT)'
        required: false
        default: 'ALL'
      date_from:
        description: 'Start date MM/DD/YYYY (leave blank to use days_back)'
        required: false
        default: ''
      date_to:
        description: 'End date MM/DD/YYYY (leave blank for today)'
        required: false
        default: ''
      days_back:
        description: 'Days back from today (used only if date_from is blank)'
        required: false
        default: '7'
      tier:
        description: 'Which tier to scrape'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - both

jobs:
  scrape:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages -q -r scraper/requirements.txt
          python3 -m pip install --break-system-packages -q google-api-python-client

      - name: Install Playwright browser
        run: python3 -m playwright install chromium --with-deps

      - name: Determine run parameters
        id: tier_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tier=${{ inputs.tier }}" >> $GITHUB_OUTPUT
            echo "counties=${{ inputs.counties }}" >> $GITHUB_OUTPUT
            # Use explicit dates if provided, otherwise fall back to days_back
            if [ -n "${{ inputs.date_from }}" ]; then
              echo "date_from=${{ inputs.date_from }}" >> $GITHUB_OUTPUT
              DATE_TO="${{ inputs.date_to }}"
              echo "date_to=${DATE_TO:-$(date +%m/%d/%Y)}" >> $GITHUB_OUTPUT
              echo "days_back=0" >> $GITHUB_OUTPUT
            else
              echo "date_from=" >> $GITHUB_OUTPUT
              echo "date_to=" >> $GITHUB_OUTPUT
              echo "days_back=${{ inputs.days_back }}" >> $GITHUB_OUTPUT
            fi
          else
            DAY=$(date +%u)
            if [ "$DAY" = "1" ]; then
              echo "tier=both" >> $GITHUB_OUTPUT
            else
              echo "tier=1" >> $GITHUB_OUTPUT
            fi
            echo "counties=ALL" >> $GITHUB_OUTPUT
            echo "date_from=" >> $GITHUB_OUTPUT
            echo "date_to=" >> $GITHUB_OUTPUT
            echo "days_back=7" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        env:
          GDRIVE_CREDS_JSON: ${{ secrets.GDRIVE_CREDS_JSON }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          DATE_FROM="${{ steps.tier_check.outputs.date_from }}"
          DATE_TO="${{ steps.tier_check.outputs.date_to }}"
          if [ -n "$DATE_FROM" ]; then
            python3 -m scraper.fetch \
              --counties "${{ steps.tier_check.outputs.counties }}" \
              --date-from "$DATE_FROM" \
              --date-to "$DATE_TO" \
              --tier "${{ steps.tier_check.outputs.tier }}" \
              --output "leads_${TODAY}.csv"
          else
            python3 -m scraper.fetch \
              --counties "${{ steps.tier_check.outputs.counties }}" \
              --days-back "${{ steps.tier_check.outputs.days_back }}" \
              --tier "${{ steps.tier_check.outputs.tier }}" \
              --output "leads_${TODAY}.csv"
          fi

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDS_JSON: ${{ secrets.GDRIVE_CREDS_JSON }}
        run: |
          if [ -z "$GDRIVE_CREDS_JSON" ]; then
            echo "GDRIVE_CREDS_JSON not set — skipping Drive upload"
            exit 0
          fi
          TODAY=$(date +%Y-%m-%d)
          python3 upload_drive.py "leads_${TODAY}.csv"

      - name: Upload to Google Sheets
        env:
          GDRIVE_CREDS_JSON: ${{ secrets.GDRIVE_CREDS_JSON }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
        run: |
          if [ -z "$GDRIVE_CREDS_JSON" ] || [ -z "$GSHEET_ID" ]; then
            echo "GDRIVE_CREDS_JSON or GSHEET_ID not set — skipping Sheets upload"
            exit 0
          fi
          TODAY=$(date +%Y-%m-%d)
          python3 upload_sheets.py "leads_${TODAY}.csv"

      - name: Generate dashboard data (leads.json)
        run: |
          TODAY=$(date +%Y-%m-%d)
          python3 - <<'EOF'
          import csv, json, pathlib, glob

          # Merge all CSVs from this run into leads.json for the dashboard
          all_leads = []
          for f in sorted(glob.glob("leads_*.csv"), reverse=True):
              with open(f, newline="", encoding="utf-8") as fh:
                  all_leads.extend(list(csv.DictReader(fh)))

          # Convert numeric fields
          for r in all_leads:
              r["lead_score"] = int(r.get("lead_score") or 0)
              r["tier"] = int(r.get("tier") or 0)

          out = pathlib.Path("dashboard/leads.json")
          out.write_text(json.dumps(all_leads, indent=2))
          print(f"Wrote {len(all_leads)} leads to dashboard/leads.json")
          EOF

      - name: Archive CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: leads-${{ github.run_id }}
          path: leads_*.csv
          retention-days: 30

      - name: Deploy dashboard to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash the generated leads.json before branch switch
          cp dashboard/leads.json /tmp/leads.json

          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Restore dashboard files
          git checkout ${{ github.sha }} -- dashboard/index.html 2>/dev/null || true
          cp /tmp/leads.json leads.json
          cp dashboard/index.html index.html 2>/dev/null || true

          git add index.html leads.json
          git diff --cached --quiet || git commit -m "Dashboard update $(date +%Y-%m-%d)"
          git push origin gh-pages
